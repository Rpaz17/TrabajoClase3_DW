<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Académica</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-image: url("HKeva8.webp");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .calculadora {
            position: relative;
            z-index: 2;
            width: 300px;
            padding: 20px;
            background: linear-gradient(to right, #d7263d 50%, #17408b 50%);
            border: 4px solid white;
            border-radius: 18px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.35);
        }

        .titulo {
            text-align: center;
            margin-bottom: 15px;
            color: white;
        }

        .pantalla {
            width: 100%;
            height: 50px;
            font-size: 24px;
            text-align: right;
            margin-bottom: 15px;
            padding: 5px;
            box-sizing: border-box;
            border: 2px solid white;
            border-radius: 10px;
            background-color: rgba(255, 255, 255, 0.95);
        }

        .botones {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        button {
            height: 45px;
            font-size: 18px;
            cursor: pointer;
            border: 2px solid white;
            border-radius: 10px;
            background-color: rgba(255, 255, 255, 0.9);
        }
    </style>
</head>

<body>

        <div class="calculadora">
            <h2 class="titulo">Calculadora</h2>

            <input type="text" id="display" class="pantalla" placeholder="0" disabled>

            <div class="botones">
                <button onclick="clearDisplay()">C</button>
                <button onclick="addParenthesis('(')">(</button>
                <button onclick="addParenthesis(')')">)</button>
                <button onclick="setOperation('/')">/</button>

                <button onclick="addNumber('7')">7</button>
                <button onclick="addNumber('8')">8</button>
                <button onclick="addNumber('9')">9</button>
                <button onclick="setOperation('*')">*</button>

                <button onclick="addNumber('4')">4</button>
                <button onclick="addNumber('5')">5</button>
                <button onclick="addNumber('6')">6</button>
                <button onclick="setOperation('-')">-</button>

                <button onclick="addNumber('1')">1</button>
                <button onclick="addNumber('2')">2</button>
                <button onclick="addNumber('3')">3</button>
                <button onclick="setOperation('+')">+</button>

                <button onclick="addNumber('0')">0</button>
                <button onclick="addDecimal()">.</button>
                <button onclick="calculate()">=</button>
            </div>
        </div>

    <script src="script.js">
    </script>

</body>

</html>
