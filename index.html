<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Académica</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .calculadora {
            background-color: white;
            width: 300px;
            padding: 20px;
            border: 2px solid #333;
        }

        .titulo {
            text-align: center;
            margin-bottom: 15px;
        }

        .pantalla {
            width: 100%;
            height: 50px;
            font-size: 24px;
            text-align: right;
            margin-bottom: 15px;
            padding: 5px;
            box-sizing: border-box;
        }

        .botones {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        button {
            height: 45px;
            font-size: 18px;
            cursor: pointer;
            border: 1px solid #333;
            background-color: #e6e6e6;
        }
    </style>
</head>

<body>

    <div class="calculadora">
        <h2 class="titulo">Calculadora</h2>

        <input type="text" class="pantalla" placeholder="0" disabled>

        <div class="botones">
            <button>C</button>
            <button>(</button>
            <button>)</button>
            <button>/</button>

            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button>*</button>

            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button>-</button>

            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button>+</button>

            <button>0</button>
            <button>.</button>
            <button>=</button>
        </div>
    </div>

    <script src="script.js">
    </script>

</body>

</html>
